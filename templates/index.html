<!DOCTYPE html>
<html>
<head>
    <title>Plagiarism Detector</title>
</head>
<body>
    <h2>Plagiarism Checker</h2>
    
    <form method="POST">
        <textarea name="text1" rows="6" cols="50" placeholder="Enter Text 1"></textarea><br><br>
        <textarea name="text2" rows="6" cols="50" placeholder="Enter Text 2"></textarea><br><br>
        
        <button type="submit">Check</button>
    </form>

    {% if result is not none %}
        <h3>Similarity: {{ result }}%</h3>
    {% endif %}
</body>
</html>
